apply plugin: 'com.android.application'

android {
    ndkVersion "27.0.12077973"

    namespace "me.lleo.wsusb"
    compileSdk 34

    defaultConfig {
        applicationId "me.lleo.wsusb"
        minSdk 21
        targetSdk 34
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.txt'
        }
    }

    externalNativeBuild {
        ndkBuild {
            path "src/main/jni/Android.mk"
        }
    }

    // Keep native libs extracted to disk (extractNativeLibs=true). Required so that
    // libusbws.so can be executed as a separate process from nativeLibraryDir.
    // Without this, Android 6+ memory-maps .so straight from the APK and exec() fails.
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.activity:activity:1.9.1'
}

configurations.implementation {
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}